<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP 在线开关</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#1a1a2e;color:#eee;
  display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{background:#16213e;border-radius:16px;padding:30px;text-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,.3);min-width:320px;max-width:400px}
h2{margin-bottom:8px;font-size:20px}
.conn{font-size:13px;margin-bottom:16px;color:#888}
.conn.on{color:#4ade80}
.step{display:none}
.step.active{display:block}
/* 步骤1: 选时长 */
.hours-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.hour-btn{padding:16px;border:2px solid #334155;border-radius:12px;background:transparent;
  color:#eee;font-size:16px;cursor:pointer;transition:.2s}
.hour-btn:hover,.hour-btn.sel{border-color:#22c55e;background:#22c55e22}
.price{color:#fbbf24;font-size:14px;margin-top:4px}
/* 步骤2: 收款码 */
.qr-img{width:240px;height:240px;margin:12px auto;border-radius:8px;object-fit:contain;background:#fff;padding:8px}
.pay-info{color:#fbbf24;font-size:18px;font-weight:bold;margin:8px 0}
.btn{padding:12px 32px;border:none;border-radius:8px;font-size:16px;cursor:pointer;margin:6px;transition:.2s}
.btn-green{background:#22c55e;color:#fff}
.btn-green:hover{background:#16a34a}
.btn-gray{background:#334155;color:#ccc}
.btn-gray:hover{background:#475569}
/* 步骤3: 运行中 */
.timer{font-size:48px;font-weight:bold;color:#22c55e;margin:16px 0}
.timer.warn{color:#f87171}
.progress{width:100%;height:8px;background:#334155;border-radius:4px;margin:12px 0}
.progress-bar{height:100%;background:#22c55e;border-radius:4px;transition:width 1s}
#log{margin-top:12px;font-size:11px;color:#555;max-height:60px;overflow-y:auto;text-align:left}
</style>
</head>
<body>
<div class="card">
<h2>⚡ 在线开关</h2>
<div id="conn" class="conn">连接中...</div>

<!-- 步骤1: 选择时长 -->
<div id="step1" class="step active">
  <p style="margin-bottom:8px">选择使用时长</p>
  <div class="hours-grid" id="hoursGrid"></div>
</div>

  <p style="font-size:13px;color:#888;margin:8px 0">扫码支付后点击下方按钮</p>
  <button class="btn btn-green" onclick="confirmPay1()">✅ 已完成支付</button>
  <br>
  <button class="btn btn-gray" onclick="goStep(1)">返回</button>
</div>

<!-- 步骤2.5: 二次确认 -->
<div id="step25" class="step">
  <p style="font-size:20px;margin:20px 0">⚠️ 真的支付完成了再确认哦</p>
  <button class="btn btn-green" onclick="confirmPay2()">✅ 确认，已支付</button>
  <br>
  <button class="btn btn-gray" onclick="goStep(2)">返回检查</button>
</div>

<!-- 步骤3: 运行中 -->
<div id="step3" class="step">
  <p>继电器运行中</p>
  <div class="timer" id="countdown">00:00:00</div>
  <div class="progress"><div class="progress-bar" id="progBar" style="width:100%"></div></div>
  <p style="font-size:13px;color:#888">到时自动关闭</p>
  <button class="btn btn-gray" onclick="stopEarly()">提前关闭</button>
</div>

<div id="log"></div>
</div>

<script>
const DEVICE_ID = '43ca48';
const BROKER = 'wss://broker.emqx.io:8084/mqtt';
const T_CMD = `esp-switch/${DEVICE_ID}/cmd`;
const T_STATE = `esp-switch/${DEVICE_ID}/state`;
const PRICE = 5; // 元/小时

let selHours = 0, totalSec = 0, remainSec = 0, timer = null;

// 生成时长按钮
const grid = document.getElementById('hoursGrid');
for (let h = 1; h <= 5; h++) {
  const b = document.createElement('button');
  b.className = 'hour-btn';
  b.innerHTML = `${h} 小时<div class="price">${h * PRICE} 元</div>`;
  b.onclick = () => { selHours = h; document.querySelectorAll('.hour-btn').forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); goStep(2); };
  grid.appendChild(b);
}

function goStep(n) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  const id = n === 2.5 ? 'step25' : `step${n}`;
  document.getElementById(id).classList.add('active');
  if (n === 2) document.getElementById('payAmount').textContent = selHours * PRICE;
}

function confirmPay1() { goStep(2.5); }

function confirmPay2() {
  // 发送带时长的开启命令
  const cmd = JSON.stringify({ action: 'on', hours: selHours });
  client.publish(T_CMD, cmd);
  log(`发送: ${cmd}`);
  totalSec = selHours * 3600;
  remainSec = totalSec;
  goStep(3);
  startTimer();
}

function startTimer() {
  if (timer) clearInterval(timer);
  timer = setInterval(() => {
    remainSec--;
    if (remainSec <= 0) { remainSec = 0; clearInterval(timer); }
    const h = Math.floor(remainSec/3600), m = Math.floor((remainSec%3600)/60), s = remainSec%60;
    const cd = document.getElementById('countdown');
    cd.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    cd.className = remainSec < 300 ? 'timer warn' : 'timer';
    document.getElementById('progBar').style.width = (remainSec/totalSec*100)+'%';
    if (remainSec <= 0) goStep(1);
  }, 1000);
}

function stopEarly() {
  client.publish(T_CMD, JSON.stringify({action:'off'}));
  if (timer) clearInterval(timer);
  goStep(1);
  log('提前关闭');
}

// MQTT
const client = mqtt.connect(BROKER, { clientId: 'web_'+Math.random().toString(16).substr(2,8), clean:true });
client.on('connect', () => {
  document.getElementById('conn').textContent = '已连接';
  document.getElementById('conn').className = 'conn on';
  client.subscribe([T_STATE]);
  log('MQTT 已连接');
});
client.on('close', () => { document.getElementById('conn').textContent = '已断开'; document.getElementById('conn').className = 'conn'; });
client.on('message', (t, p) => {
  try { const d = JSON.parse(p.toString()); if (t===T_STATE) log(`状态: ${d.state}`); } catch(e){}
});

function log(msg) {
  const el = document.getElementById('log');
  el.innerHTML = `<div>${new Date().toLocaleTimeString()} ${msg}</div>` + el.innerHTML;
  if (el.children.length > 10) el.lastChild.remove();
}
</script>
